name: Autoupdate
on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
  workflow_call:
concurrency:
  group: "${{ github.workflow }} @ ${{ github.ref }}"
  cancel-in-progress: false
permissions:
  contents: write
  actions: write
  pull-requests: write
  issues: write
env:
  AUTOUPDATE_BRANCH: chore/autoupdate-${{ github.run_id }}
jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          ref: main
          token: ${{ secrets.TOKEN_FOR_WORKFLOW }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.email "slavianich@gmail.com"
          git config user.name "Siarhei Dudko"

      - name: Create autoupdate branch
        run: |
          git checkout -b "$AUTOUPDATE_BRANCH"
          git push -u origin "$AUTOUPDATE_BRANCH"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Autoupdate
        id: autoupdate
        continue-on-error: true
        uses: siarheidudko/autoupdater@v6
        with:
          author-email: "slavianich@gmail.com"
          author-name: "Siarhei Dudko"
          working-directory: ${{ github.workspace }}
          ref: ${{ github.repository }}
          branch: ${{ env.AUTOUPDATE_BRANCH }}
          builds-and-checks: |
            npm run lint
            npm run build
            npm run test:ts
          debug: "true"
          ignore-packages: |
            @types/node
            nyc

      - name: Sync branch state
        if: always()
        run: |
          git fetch origin "$AUTOUPDATE_BRANCH" || true
          git reset --hard "origin/$AUTOUPDATE_BRANCH" || true

      - name: Fallback baseline update on failure with empty diff
        if: steps.autoupdate.outcome == 'failure'
        run: |
          git fetch origin main
          if git diff --quiet origin/main; then
            npx --yes npm-check-updates -u || true
            npm install --no-audit --no-fund || true
            if [ -n "$(git status --porcelain)" ]; then
              git add -A
              git commit -m "chore(deps): npm-check-updates baseline (autoupdater fallback)"
              git push origin "$AUTOUPDATE_BRANCH"
            fi
          fi

      - name: Check for diff vs main
        id: diff
        if: always()
        run: |
          git fetch origin main
          if git diff --quiet origin/main; then
            echo "has_diff=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_diff=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Read package version
        id: pkg
        if: steps.diff.outputs.has_diff == 'true'
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Open PR (autoupdater succeeded)
        if: |
          steps.autoupdate.outcome == 'success' &&
          steps.autoupdate.outputs.updated == 'true' &&
          steps.diff.outputs.has_diff == 'true'
        env:
          GH_TOKEN: ${{ secrets.TOKEN_FOR_WORKFLOW }}
        run: |
          BODY=$(cat <<EOF
          Automated dependency update.

          - autoupdater outcome: success
          - target version: v${{ steps.pkg.outputs.version }}

          PR-checks must be green before merge.
          EOF
          )
          gh pr create \
            --base main \
            --head "$AUTOUPDATE_BRANCH" \
            --title "chore(deps): autoupdate v${{ steps.pkg.outputs.version }}" \
            --body "$BODY" \
            --label autoupdate || true

      - name: Open draft PR (autoupdater failed → @claude)
        if: steps.autoupdate.outcome == 'failure' && steps.diff.outputs.has_diff == 'true'
        env:
          GH_TOKEN: ${{ secrets.TOKEN_FOR_WORKFLOW }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          BODY=$(cat <<EOF
          @claude автоапдейт зависимостей упал.

          Лог запуска: $RUN_URL

          Задача: запушь в эту ветку правки так, чтобы прошли:

              npm run lint
              npm run build
              npm run test:ts

          Меняй только то, что нужно для совместимости с обновлёнными зависимостями (типы, переименованные экспорты, breaking changes). Продуктовую логику не трогай.

          После коммитов снова запустится workflow "PR checks" — он подтвердит зелёное состояние.
          EOF
          )
          gh pr create \
            --base main \
            --head "$AUTOUPDATE_BRANCH" \
            --title "chore(deps): autoupdate (needs claude fix)" \
            --body "$BODY" \
            --draft \
            --label autoupdate \
            --label needs-claude || true

      - name: Cleanup branch when nothing to ship
        if: always() && steps.diff.outputs.has_diff != 'true'
        run: |
          git push origin --delete "$AUTOUPDATE_BRANCH" || true
